name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-tests:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run Go tests
        working-directory: go
        run: go test -v -count=1 ./...

  dart-unit-tests:
    name: Dart unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows excluded: cgo requires MinGW/gcc which isn't on the runner.
        # Windows is tested via Go unit tests (no cgo needed for pure Go tests).
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: dart pub get
      - name: Analyze
        run: dart analyze lib/ test/ hook/
      - name: Unit tests
        run: dart test test/tailscale_test.dart

  ffi-integration-tests:
    name: FFI integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: dart pub get
      - name: FFI integration tests
        run: dart test test/ffi_integration_test.dart

  e2e-tests:
    name: E2E (Headscale)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: dart pub get
      - name: Start Headscale
        run: docker compose -f test/e2e/docker-compose.yml up -d --wait
      - name: Wait for Headscale
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health > /dev/null 2>&1 && break
            sleep 1
          done
      - name: Create user and auth key
        id: headscale
        run: |
          docker compose -f test/e2e/docker-compose.yml exec -T headscale headscale users create dune-test || true
          AUTH_KEY=$(docker compose -f test/e2e/docker-compose.yml exec -T headscale headscale preauthkeys create --user dune-test --ephemeral --expiration 5m | tail -1)
          echo "auth_key=$AUTH_KEY" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests
        env:
          HEADSCALE_URL: http://localhost:8080
          HEADSCALE_AUTH_KEY: ${{ steps.headscale.outputs.auth_key }}
        run: dart test test/e2e/e2e_test.dart --timeout=120s
      - name: Teardown
        if: always()
        run: docker compose -f test/e2e/docker-compose.yml down -v
