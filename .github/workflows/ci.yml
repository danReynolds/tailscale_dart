name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: these jobs only read the repo. Prevents a compromised
# third-party action from using a write-scoped GITHUB_TOKEN to push to the
# repo or tamper with releases.
permissions:
  contents: read

jobs:
  go-tests:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Vet
        working-directory: go
        run: go vet ./...
      - name: Run Go tests
        working-directory: go
        run: go test -v -count=1 ./...

  dart-tests:
    name: Dart tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - run: dart pub get
      - name: Analyze
        run: dart analyze lib/ test/ hook/
      - name: Tests
        # Runs test/unit and test/integration. test/e2e is discovered too, but
        # bails out unless HEADSCALE_* env vars are set; the real Headscale run
        # has its own job below. dart_test.yaml pins concurrency to 1 so native
        # runtime tests don't stomp per-process global state.
        run: dart test

  e2e-tests:
    name: E2E (Headscale)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - run: dart pub get
      - name: Start Headscale
        run: docker compose -f test/e2e/docker-compose.yml up -d --wait
      - name: Wait for Headscale
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health > /dev/null 2>&1 && break
            sleep 1
          done
      - name: Create user and auth keys
        id: headscale
        run: |
          docker compose -f test/e2e/docker-compose.yml exec -T headscale headscale users create dune-test || true
          # Disposable peer nodes use an ephemeral key; reconnect/persistence
          # assertions use a separate non-ephemeral key.
          AUTH_KEY=$(docker compose -f test/e2e/docker-compose.yml exec -T headscale headscale preauthkeys create --user dune-test --reusable --ephemeral --expiration 10m | tail -1)
          PERSIST_AUTH_KEY=$(docker compose -f test/e2e/docker-compose.yml exec -T headscale headscale preauthkeys create --user dune-test --reusable --expiration 10m | tail -1)
          echo "auth_key=$AUTH_KEY" >> "$GITHUB_OUTPUT"
          echo "persist_auth_key=$PERSIST_AUTH_KEY" >> "$GITHUB_OUTPUT"
      - name: Run E2E tests
        env:
          HEADSCALE_URL: http://localhost:8080
          HEADSCALE_AUTH_KEY: ${{ steps.headscale.outputs.auth_key }}
          HEADSCALE_PERSIST_AUTH_KEY: ${{ steps.headscale.outputs.persist_auth_key }}
        run: dart test test/e2e/e2e_test.dart --timeout=360s
      - name: Teardown
        if: always()
        run: docker compose -f test/e2e/docker-compose.yml down -v
